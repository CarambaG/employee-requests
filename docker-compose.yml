services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-employee_requests}
      POSTGRES_USER: ${POSTGRES_USER:-employee_requests}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-employee_requests}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-employee_requests} -d ${POSTGRES_DB:-employee_requests}
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: postgres:17-alpine
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-employee_requests}:${POSTGRES_PASSWORD:-employee_requests}@db:5432/${POSTGRES_DB:-employee_requests}?sslmode=disable
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh", "/migrations/migrate.sh"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
    environment:
      APP_ENV: ${APP_ENV:-local}
      HTTP_ADDR: :8080
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
      DATABASE_URL: postgres://${POSTGRES_USER:-employee_requests}:${POSTGRES_PASSWORD:-employee_requests}@db:5432/${POSTGRES_DB:-employee_requests}?sslmode=disable
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-20}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS:-2}
      DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-5s}
      DATABASE_HEALTH_CHECK_PERIOD: ${DATABASE_HEALTH_CHECK_PERIOD:-30s}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
